<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Groundwork">
<meta name="theme-color" content="#111210">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Groundwork</title>
<script src="exercises.js"></script>
<style>
:root {
  --brand:#C8A84B; --brand-dim:rgba(200,168,75,0.12); --gold:#C8A84B; --gold-dim:rgba(200,168,75,0.12);
  --green:#6B8F5E; --green-dim:rgba(107,143,94,0.15); --blue:#5B7FA6; --blue-dim:rgba(91,127,166,0.15);
  --purple:#7C5CBF; --red:#A63228; --bg:#111210; --s1:#161714; --s2:#1C1D1A; --s3:#222320; --s4:#2C2D29;
  --border:rgba(255,255,255,0.08); --border-hi:rgba(200,168,75,0.3); --t1:#E8E4DC; --t2:#8A8880; --t3:#505048;
  --r-sm:4px; --r-md:8px; --r-lg:12px; --r-xl:14px; --pad:16px;
  --safe-top:env(safe-area-inset-top,44px); --safe-bot:env(safe-area-inset-bottom,20px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Barlow',sans-serif;color:var(--t1)}
</style>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="app" style="display:flex;flex-direction:column;width:100%;height:100%;align-items:center;justify-content:center;background:#111210;">
  <div style="font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:800;letter-spacing:5px;color:#E8E4DC;">
    GROUND<span style="color:#C8A84B;">WORK</span>
  </div>
  <div style="font-size:12px;color:#505048;letter-spacing:3px;margin-top:8px;">PERFORMANCE PLATFORM</div>
  <div style="margin-top:40px;font-size:14px;color:#8A8880;">App loading — exercises.js required</div>
</div>
</body>
</html>
